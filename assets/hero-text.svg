<svg xmlns="http://www.w3.org/2000/svg" width="600" height="250" viewBox="0 0 600 250">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap');
      text {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      }
      .greeting { font-size: 24px; font-weight: 500; fill: #475569; }
      .name { font-size: 52px; font-weight: 800; fill: #1d4ed8; }
      .title { font-size: 26px; font-weight: 600; fill: #334155; }
      .desc { font-size: 17px; font-weight: 400; fill: #475569; }
    </style>
  </defs>
  
  <text x="0" y="30" class="greeting">Hello, I'm</text>
  <text x="0" y="95" class="name">Ravindra Chowdary <tspan font-family="sans-serif">👋</tspan></text>
  <text x="0" y="145" class="title">Full Stack Java Developer</text>
  
  <text x="0" y="195" class="desc">I build scalable web applications, robust REST APIs, and</text>
  <text x="0" y="225" class="desc">cloud-enabled solutions with clean code and best practices.</text>
</svg>
