<svg xmlns="http://www.w3.org/2000/svg" width="750" height="440" viewBox="0 0 750 440">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap');
      text {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .hi { font-size: 28px; font-weight: 700; fill: #0f172a; }
      .fname { font-size: 76px; font-weight: 900; fill: #0a2540; letter-spacing: -1px; }
      .lname { font-size: 76px; font-weight: 900; fill: #ff8c00; letter-spacing: -1px; }
      .role-bg { fill: #2563eb; }
      .role-text { font-size: 24px; font-weight: 600; fill: #ffffff; }
      .desc { font-size: 19px; font-weight: 500; fill: #334155; }
      .contact-text { font-size: 16px; font-weight: 500; fill: #1e293b; }
      .separator { font-size: 18px; font-weight: 400; fill: #cbd5e1; }
    </style>
  </defs>

  <!-- Hi, I'm -->
  <text x="0" y="35" class="hi">Hi <tspan font-family="sans-serif">👋</tspan>, I'm</text>
  
  <!-- RAVINDRA -->
  <text x="0" y="115" class="fname">RAVINDRA</text>
  
  <!-- KOMMINENI -->
  <text x="0" y="195" class="lname">KOMMINENI</text>
  
  <!-- Role Badge -->
  <rect x="0" y="215" width="460" height="42" rx="10" class="role-bg" />
  <text x="18" y="244" class="role-text">Full Stack Java &amp; MERN Developer</text>
  
  <!-- Description -->
  <text x="0" y="295" class="desc">I build scalable web applications, robust REST APIs,</text>
  <text x="0" y="322" class="desc">and cloud-enabled solutions with clean code</text>
  <text x="0" y="349" class="desc">and best practices.</text>

  <!-- Contact Info -->
  <g transform="translate(0, 390)">
    <!-- Email -->
    <circle cx="16" cy="16" r="16" class="role-bg" />
    <svg x="6" y="6" width="20" height="20" viewBox="0 0 24 24" fill="#ffffff">
      <path d="M22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6zm-2 0l-8 4.99-8-4.99h16zm0 12H4V8l8 5 8-5v10z"/>
    </svg>
    <text x="42" y="22" class="contact-text">kommineniravindra99@gmail.com</text>
    
    <text x="315" y="21" class="separator">|</text>
  </g>

  <g transform="translate(340, 390)">
    <!-- Phone -->
    <circle cx="16" cy="16" r="16" class="role-bg" />
    <svg x="6" y="6" width="20" height="20" viewBox="0 0 24 24" fill="#ffffff">
      <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
    </svg>
    <text x="42" y="22" class="contact-text">+91 9603262008</text>
    
    <text x="185" y="21" class="separator">|</text>
  </g>

  <g transform="translate(550, 390)">
    <!-- Location -->
    <circle cx="16" cy="16" r="16" class="role-bg" />
    <svg x="6" y="6" width="20" height="20" viewBox="0 0 24 24" fill="#ffffff">
      <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
    </svg>
    <text x="42" y="22" class="contact-text">India</text>
  </g>
</svg>
